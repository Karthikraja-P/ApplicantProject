<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Singularity</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: rgba(13, 27, 42, 0.95);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: #00d4ff;
            margin: 10px 0;
        }

        .flash-messages {
            margin-bottom: 20px;
        }

        .flash-msg {
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .flash-msg.error {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #aac4e8;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #2a3f60;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }

        .form-group input:focus {
            border-color: #00d4ff;
            outline: none;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body style="background-color:#000;">
    <div class="login-container">
        <div class="login-header">
            <img src="/static/images/singularity_logo.jpg" style="width:60px;border-radius:50%;" alt="Logo">
            <h2>Admin Access</h2>
        </div>

        <div id="status-container"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">Login to Dashboard</button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const statusBox = document.getElementById('status-container');

            try {
                // Using window.API_BASE_URL if it exists
                const apiBase = window.API_BASE_URL || '';
                const response = await fetch(`${apiBase}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    localStorage.setItem('tf_admin_pass', data.password);
                    window.location.href = '/admin.html';
                } else {
                    const err = await response.json();
                    statusBox.innerHTML = `<div class="flash-msg error">${err.message || 'Invalid credentials.'}</div>`;
                }
            } catch (err) {
                statusBox.innerHTML = '<div class="flash-msg error">Connection failed.</div>';
            }
        });
    </script>
</body>

</html>
