<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>body { background: white; }</style>
  </defs>
  <rect width="200" height="200" fill="white" stroke="#142e56" stroke-width="2"/>
  <circle cx="100" cy="100" r="75" fill="white" stroke="#142e56" stroke-width="2"/>
  <!-- Vertical line -->
  <line x1="100" y1="25" x2="100" y2="175" stroke="#142e56" stroke-width="2"/>
  <!-- Horizontal line -->
  <line x1="25" y1="100" x2="175" y2="100" stroke="#142e56" stroke-width="2"/>
  <!-- Bottom-right quadrant dark blue -->
  <path d="M 100 100 L 175 100 A 75 75 0 0 1 100 175 Z" fill="#142e56"/>
  <!-- Small circle top center -->
  <circle cx="100" cy="45" r="10" fill="white" stroke="#142e56" stroke-width="2"/>
</svg>