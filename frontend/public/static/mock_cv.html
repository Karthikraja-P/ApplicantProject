<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mock CV Viewer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1b2e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .cv-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #00d4ff;
            border-radius: 20px;
            padding: 60px;
            text-align: center;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }
        h1 { color: #00d4ff; }
        p { color: #5a7ca0; line-height: 1.6; }
        .badge {
            background: #00ff88;
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="cv-card">
        <div class="badge">DUMMY DATA</div>
        <h1>Mock CV Viewer</h1>
        <p>This is a <strong>local placeholder</strong> for testing purposes.</p>
        <p>In the production environment, this link would redirect to a secure, presigned S3 URL to view the applicant's real PDF or DOCX file.</p>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">
        <p style="font-size: 0.8rem;">Request ID: MOCK_S3_KEY_EXISTS</p>
    </div>
</body>
</html>
