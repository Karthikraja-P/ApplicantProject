<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient circles -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.08" />
    </linearGradient>
  </defs>
  
  <!-- Floating abstract shapes -->
  <circle cx="50" cy="40" r="35" fill="url(#grad1)" opacity="0.6"/>
  <circle cx="150" cy="80" r="28" fill="url(#grad2)" opacity="0.5"/>
  <circle cx="100" cy="150" r="42" fill="url(#grad1)" opacity="0.4"/>
  <circle cx="40" cy="220" r="30" fill="url(#grad2)" opacity="0.5"/>
  <circle cx="160" cy="260" r="25" fill="url(#grad1)" opacity="0.6"/>
  
  <!-- Connecting lines -->
  <line x1="50" y1="40" x2="100" y2="150" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
  <line x1="150" y1="80" x2="100" y2="150" stroke="#00ff88" stroke-width="1" opacity="0.2"/>
  <line x1="40" y1="220" x2="100" y2="150" stroke="#00d4ff" stroke-width="0.8" opacity="0.15"/>
  <line x1="160" y1="260" x2="100" y2="150" stroke="#00ff88" stroke-width="0.8" opacity="0.15"/>
  
  <!-- Accent dots -->
  <circle cx="50" cy="40" r="3" fill="#00d4ff" opacity="0.8"/>
  <circle cx="150" cy="80" r="2.5" fill="#00ff88" opacity="0.8"/>
  <circle cx="100" cy="150" r="3.5" fill="#00d4ff" opacity="0.7"/>
  <circle cx="40" cy="220" r="2.5" fill="#00ff88" opacity="0.8"/>
  <circle cx="160" cy="260" r="2" fill="#00d4ff" opacity="0.7"/>
</svg>
