<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Application - Quant Singularity</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>TalentForge</h1>
            <p>Join our innovative team in shaping the future</p>
        </header>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
            <div class="progress-text">Application Progress: <span id="progress-text">0%</span></div>
        </div>

        <form id="application-form" action="{{ url_for('submit') }}" method="post" enctype="multipart/form-data">
            <!-- Section 1: Personal Information -->
            <div class="form-section" id="section-1">
                <h2>1. Personal Information</h2>
                <div class="form-group">
                    <label for="full_name">Full Name <span class="required">*</span></label>
                    <input type="text" id="full_name" name="full_name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" pattern="[\+]?[\d\s\-\(\)]+" maxlength="15">
                </div>
                <div class="form-group">
                    <label for="location">Current Location (City, Country) <span class="required">*</span></label>
                    <input type="text" id="location" name="location" required>
                </div>
                <div class="form-group">
                    <label for="linkedin">LinkedIn Profile URL <span class="required">*</span></label>
                    <input type="url" id="linkedin" name="linkedin" required>
                </div>
            </div>

            <!-- Section 2: Professional Snapshot -->
            <div class="form-section" id="section-2">
                <h2>2. Professional Snapshot</h2>
                <div class="form-group">
                    <label for="current_role">Current Role / Title <span class="required">*</span></label>
                    <input type="text" id="current_role" name="current_role" required>
                </div>
                <div class="form-group">
                    <label for="current_company">Current Company or Institution <span class="required">*</span></label>
                    <input type="text" id="current_company" name="current_company" required>
                </div>
                <div class="form-group">
                    <label for="experience">Years of Experience <span class="required">*</span></label>
                    <select id="experience" name="experience" required>
                        <option value="">Select...</option>
                        <option value="0-1">0–1</option>
                        <option value="1-3">1–3</option>
                        <option value="3-5">3–5</option>
                        <option value="5+">5+</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Highest Education <span class="required">*</span></label>
                    <input type="text" id="degree" name="degree" placeholder="Degree" required>
                    <input type="text" id="field" name="field" placeholder="Field of Study" required>
                    <input type="text" id="university" name="university" placeholder="University" required>
                </div>
            </div>

            <!-- Section 3: CV & Portfolio -->
            <div class="form-section" id="section-3">
                <h2>3. CV & Portfolio</h2>
                <div class="form-group">
                    <label for="cv">Upload CV (PDF only) <span class="required">*</span></label>
                    <input type="file" id="cv" name="cv" accept=".pdf" required>
                </div>
                <div class="form-group">
                    <label for="portfolio">Portfolio / GitHub / Personal Website links</label>
                    <input type="url" id="portfolio" name="portfolio">
                </div>
            </div>

            <!-- Section 4: Eligibility & Availability -->
            <div class="form-section" id="section-4">
                <h2>4. Eligibility & Availability</h2>
                <div class="form-group">
                    <label for="work_type">Preferred work type <span class="required">*</span></label>
                    <select id="work_type" name="work_type" required>
                        <option value="">Select...</option>
                        <option value="full-time">Full-time</option>
                        <option value="internship">Internship</option>
                        <option value="contract">Contract</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="start_date">Available Start Date <span class="required">*</span></label>
                    <input type="date" id="start_date" name="start_date" required>
                </div>
                <div class="form-group">
                    <label for="work_preference">Work preference <span class="required">*</span></label>
                    <select id="work_preference" name="work_preference" required>
                        <option value="">Select...</option>
                        <option value="remote">Remote</option>
                        <option value="on-site">On-site</option>
                        <option value="hybrid">Hybrid</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="constraints">Any constraints or additional notes</label>
                    <textarea id="constraints" name="constraints"></textarea>
                </div>
            </div>

            <!-- Section 5: Motivation -->
            <div class="form-section" id="section-5">
                <h2>5. Motivation</h2>
                <div class="form-group">
                    <label for="interest">Why are you interested in working with us? <span class="required">*</span></label>
                    <textarea id="interest" name="interest" required></textarea>
                </div>
                <div class="form-group">
                    <label for="problems">What kind of problems do you enjoy solving?</label>
                    <textarea id="problems" name="problems"></textarea>
                </div>
            </div>

            <!-- Section 6: Basic Skill Snapshot -->
            <div class="form-section" id="section-6">
                <h2>6. Basic Skill Snapshot</h2>
                <div class="form-group">
                    <label for="area">Primary Area of Interest <span class="required">*</span></label>
                    <select id="area" name="area" required>
                        <option value="">Select...</option>
                        <option value="database">Database / Backend Systems</option>
                        <option value="ml">Financial Machine Learning</option>
                        <option value="ai">AI / LLM Systems</option>
                        <option value="not-sure">Not sure</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Skills (select all that apply)</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="skills" value="python"> Python</label>
                        <label><input type="checkbox" name="skills" value="sql"> SQL</label>
                        <label><input type="checkbox" name="skills" value="ml"> Machine Learning</label>
                        <label><input type="checkbox" name="skills" value="data-eng"> Data Engineering</label>
                        <label><input type="checkbox" name="skills" value="apis"> APIs / Backend Development</label>
                        <label><input type="checkbox" name="skills" value="other"> Other</label>
                    </div>
                </div>
            </div>

            <!-- Section 7: Source Tracking -->
            <div class="form-section" id="section-7">
                <h2>7. Source Tracking</h2>
                <div class="form-group">
                    <label for="source">Where did you hear about us? <span class="required">*</span></label>
                    <select id="source" name="source" required>
                        <option value="">Select...</option>
                        <option value="linkedin">LinkedIn</option>
                        <option value="referral">Referral</option>
                        <option value="website">Website</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>

            <div class="submit-container">
                <button type="submit" class="submit-btn">Submit Application</button>
            </div>
        </form>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
